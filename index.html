<!DOCTYPE html>

const TABS = [

/* ──────────────────── Shared components ──────────────────── */
function Card({ children, className="" }) {
  return <div className={`bg-white rounded-xl border border-gray-200 p-6 ${className}`}>{children}</div>;
}
function SectionTitle({ children }) {
  return (
    <h2 className="text-lg font-bold text-gray-800 mb-5 pb-2 border-b-2 border-green-500 flex items-center gap-2">
      {children}
    </h2>
  );
}
function StatCard({ value, label, color, icon }) {
  return (
    <div className={`${color} text-white rounded-xl p-5`}>
      <div className="text-3xl mb-1">{icon}</div>
      <div className="text-2xl font-extrabold">{value}</div>
      <div className="text-sm opacity-90 mt-1">{label}</div>
    </div>
  );
}
function Badge({ children, color="bg-green-100 text-green-700" }) {
  return <span className={`inline-flex px-2 py-0.5 rounded-full text-xs font-medium ${color}`}>{children}</span>;
}

function OverviewTab() {

    { num:"5", title:"فعاليات وبرامج تواصل", icon:"🤝", color:"bg-teal-700", light:"border-teal-300 bg-teal-50",
      items:["فعاليات تواصل ورياديات (Networking Events)","ندوات ومحاضرات متخصصة","دورات تدريبية وورش عمل (Workshops)","حملات توعوية ومجتمعية","Demo Day لعرض منتجات الشركات الناشئة","فعاليات Go-To-Market","مجتمع ريادة الأعمال التأميني"] },
  ];

  return (
    <div className="space-y-6 fade-in">
      {/* Summary strip */}
      <div className="grid grid-cols-5 gap-2">
        {pillars.map((p,i)=>(
          <button key={i} onClick={()=>setActive(i)}

            <div className="text-xl mb-1">{p.icon}</div>

/* ──────────────────── Timeline ──────────────────── */
function TimelineTab() {
  const phases = [

    { phase:"المرحلة الثانية", days:30,  color:"bg-teal-500",   border:"border-teal-300 bg-teal-50",

    { phase:"المرحلة الثالثة", days:45,  color:"bg-emerald-500", border:"border-emerald-300 bg-emerald-50",
      items:["منصة إدارة الابتكار (Prototype)","هيكل الهاكاثون الأول","مسار إدارة الأفكار","خطة مجتمع الريادة","Branding & Collaborators"] },
    { phase:"المرحلة الرابعة", days:60,  color:"bg-green-600",  border:"border-green-400 bg-green-50",
      items:["إطلاق منصة الابتكار (MVP كامل)","تشغيل برنامج InGrowth","تنفيذ الهاكاثون الأول","برامج التدريب والورش","تقرير الأداء الأول"] },
    { phase:"المرحلة الخامسة", days:90,  color:"bg-teal-600",   border:"border-teal-400 bg-teal-50",
      items:["تشغيل مسرّع الأعمال (Accelerator)","Demo Day الأول","Go-To-Market للشركات الناشئة","فعاليات مجتمع الريادة","تقرير أثر مرحلي"] },
    { phase:"المرحلة السادسة", days:285, color:"bg-green-800",  border:"border-green-500 bg-green-50",
      items:["برامج الشراكات الاستراتيجية","بناء مجتمع Insurtech","تقرير الأثر السنوي","خطة الاستدامة والتطوير"] },
  ];
  const total = phases.reduce((s,p)=>s+p.days,0);

  return (
    <div className="space-y-6 fade-in">
      <Card>
        <SectionTitle>الجدول الزمني للمشروع</SectionTitle>
        <div className="bg-green-50 border border-green-200 rounded-lg p-4 mb-5 flex items-center gap-4">
          <span className="text-3xl">📅</span>
          <div>
            <p className="text-green-800 font-semibold text-sm">مدة التنفيذ الإجمالية: 18 شهراً</p>
            <p className="text-green-600 text-xs">تُحسب بالتقويم الميلادي — تبدأ من تاريخ إشعار البدء بالعمل</p>
          </div>
        </div>

        {/* Visual bar */}
        <div className="mb-5">
          <div className="flex h-10 rounded-xl overflow-hidden gap-0.5">
            {phases.map((p,i)=>(
              <div key={i} className={`${p.color} flex items-center justify-center text-white text-xs font-bold`}
                style={{width:`${(p.days/total)*100}%`}}>
                {i+1}
              </div>
            ))}
          </div>
          <div className="flex mt-1">
            {phases.map((p,i)=>(
              <div key={i} style={{width:`${(p.days/total)*100}%`}} className="text-center text-xs text-gray-400 truncate">{p.days}ي</div>
            ))}
          </div>
        </div>

        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
          {phases.map((p,i)=>(
            <div key={i} className={`rounded-xl border-2 ${p.border} p-4`}>
              <div className="flex items-center justify-between mb-3">
                <h3 className="font-bold text-gray-800 text-sm">{p.phase}</h3>
                <span className={`${p.color} text-white text-xs px-2 py-1 rounded-full`}>{p.days} يوم</span>
              </div>
              <ul className="space-y-1.5">
                {p.items.map((d,j)=>(
                  <li key={j} className="text-xs text-gray-700 flex items-start gap-1.5">
                    <span className="text-green-500 shrink-0 font-bold">→</span>{d}
                  </li>
                ))}

            </div>
          ))}

      </Card>

              <div>
                <h4 className="font-semibold text-green-800 text-sm">التواجد الميداني</h4>
                <p className="text-xs text-gray-600 mt-1">5 أيام أسبوعياً في مقر هيئة التأمين لفريق العمل الأساسي</p>
              </div>

            <div className="flex gap-3 bg-blue-50 rounded-lg p-4 border border-blue-200">

              <div>
                <h4 className="font-semibold text-blue-800 text-sm">العمل عن بُعد</h4>
                <p className="text-xs text-gray-600 mt-1">مسموح به للمهام غير الميدانية بموافقة الهيئة</p>
              </div>
            </div>
          </div>
        </Card>
        <Card>
          <SectionTitle>نقل المعرفة والتدريب</SectionTitle>
          <div className="space-y-3">
            {["تدريب فريق هيئة التأمين على منهجيات الابتكار","نقل المعرفة التقنية لفريق تقنية المعلومات","توثيق الإجراءات في SOPs قابلة للاستخدام","ورش عمل دورية طوال فترة العقد"].map((item,i)=>(
              <div key={i} className="flex items-start gap-2 text-xs text-gray-700">
                <span className="text-teal-600 font-bold shrink-0">◉</span>{item}
              </div>
            ))}
          </div>
        </Card>
      </div>
    </div>
  );

        </div>
      </header>

      {/* Tab nav */}
      <nav className="bg-white border-b border-gray-200 shadow-sm">
        <div className="max-w-7xl mx-auto px-4">
          <div className="flex gap-0 overflow-x-auto tab-scroll">
            {TABS.map(tab=>(
              <button key={tab.id} onClick={()=>setActiveTab(tab.id)}
                className={`px-4 py-3 text-sm font-medium whitespace-nowrap border-b-2 transition-colors flex items-center gap-1.5 ${
                  activeTab===tab.id
                    ? "border-green-600 text-green-700 bg-green-50"
                    : "border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300"
                }`}>
                <span>{tab.icon}</span>
                <span>{tab.label}</span>
              </button>
            ))}
          </div>
        </div>
      </nav>

      {/* Content */}
      <main className="max-w-7xl mx-auto px-4 py-6">
        {activeTab==="overview"     && <OverviewTab />}
        {activeTab==="scope"        && <ScopeTab />}
        {activeTab==="timeline"     && <TimelineTab />}
        {activeTab==="evaluation"   && <EvaluationTab />}
        {activeTab==="team"         && <TeamTab />}
        {activeTab==="deliverables" && <DeliverablesTab />}
        {activeTab==="creative"     && <CreativeTab />}
        {activeTab==="faq"          && <FAQTab />}
      </main>

      {/* Footer */}
      <footer className="bg-white border-t border-gray-200 mt-10">
        <div className="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
          <p className="text-xs text-gray-400">هيئة التأمين — كراسة الشروط والمواصفات رقم 74-2026 | تصنيف: عام</p>
          <p className="text-xs text-gray-400">مدة التنفيذ: 18 شهراً</p>
        </div>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
